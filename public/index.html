<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>tpl-webgpu-react React WebGPU Starter</title>
    <meta name="description" content="No-build React WebGPU starter for AI WebGPU Lab">
    <style>
      :root {
        color-scheme: light;
        --bg: #f4efe4;
        --ink: #111827;
        --muted: #5b6575;
        --accent: #ff7a18;
        --accent-strong: #e85d04;
        --panel: rgba(255, 250, 242, 0.92);
        --panel-strong: rgba(255, 255, 255, 0.98);
        --border: rgba(17, 24, 39, 0.12);
        --success: #0f766e;
        --warn: #b45309;
        --danger: #be123c;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Segoe UI", "Helvetica Neue", Arial, sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at top right, rgba(255, 122, 24, 0.14), transparent 24%),
          radial-gradient(circle at bottom left, rgba(20, 184, 166, 0.12), transparent 30%),
          linear-gradient(180deg, #f7f3ea 0%, #efe6d7 100%);
      }

      main {
        width: min(1180px, calc(100% - 32px));
        margin: 24px auto;
        padding: 28px;
        border-radius: 28px;
        background: var(--panel);
        border: 1px solid var(--border);
        box-shadow: 0 26px 64px rgba(17, 24, 39, 0.12);
      }

      .eyebrow {
        display: inline-flex;
        padding: 6px 12px;
        border-radius: 999px;
        background: rgba(255, 122, 24, 0.12);
        color: var(--accent-strong);
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      h1 {
        margin: 14px 0 10px;
        font-size: clamp(34px, 5vw, 54px);
        line-height: 1.02;
      }

      p {
        margin: 0 0 12px;
        color: var(--muted);
        line-height: 1.7;
      }

      .grid {
        display: grid;
        gap: 18px;
      }

      .hero {
        grid-template-columns: minmax(0, 1.1fr) minmax(340px, 0.95fr);
        align-items: start;
        margin-top: 22px;
      }

      .stack {
        display: grid;
        gap: 18px;
      }

      .panel {
        padding: 18px;
        border-radius: 20px;
        background: var(--panel-strong);
        border: 1px solid var(--border);
      }

      .panel h2 {
        margin: 0 0 14px;
        font-size: 18px;
      }

      .status-row,
      .actions,
      .links {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        min-height: 34px;
        padding: 0 12px;
        border-radius: 999px;
        background: rgba(17, 24, 39, 0.06);
        border: 1px solid rgba(17, 24, 39, 0.1);
        font-size: 13px;
        font-weight: 600;
      }

      .badge.success {
        color: var(--success);
        border-color: rgba(15, 118, 110, 0.16);
      }

      .badge.warn {
        color: var(--warn);
        border-color: rgba(180, 83, 9, 0.18);
      }

      .badge.danger {
        color: var(--danger);
        border-color: rgba(190, 18, 60, 0.16);
      }

      button,
      a.button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 46px;
        padding: 0 18px;
        border: 0;
        border-radius: 999px;
        background: linear-gradient(135deg, var(--accent) 0%, var(--accent-strong) 100%);
        color: white;
        font-weight: 700;
        text-decoration: none;
        cursor: pointer;
      }

      button.secondary,
      a.button.secondary {
        background: rgba(17, 24, 39, 0.06);
        border: 1px solid rgba(17, 24, 39, 0.12);
        color: var(--ink);
      }

      .metric-grid,
      .meta-grid {
        display: grid;
        gap: 12px;
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      }

      .card {
        padding: 14px;
        border-radius: 16px;
        background: #fff;
        border: 1px solid rgba(17, 24, 39, 0.08);
      }

      .label {
        display: block;
        margin-bottom: 8px;
        color: var(--muted);
        font-size: 12px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .value {
        font-size: 18px;
        font-weight: 600;
        word-break: break-word;
      }

      canvas {
        display: block;
        width: 100%;
        aspect-ratio: 16 / 9;
        border-radius: 18px;
        border: 1px solid rgba(17, 24, 39, 0.1);
        background: linear-gradient(135deg, #fff 0%, #f0f4f8 100%);
      }

      ul {
        margin: 0;
        padding-left: 18px;
        color: var(--muted);
      }

      li + li {
        margin-top: 8px;
      }

      pre {
        margin: 0;
        max-height: 340px;
        overflow: auto;
        padding: 14px;
        border-radius: 16px;
        background: #fff;
        border: 1px solid rgba(17, 24, 39, 0.08);
        color: #132235;
        font-size: 13px;
        line-height: 1.6;
      }

      @media (max-width: 900px) {
        main {
          width: min(100%, calc(100% - 16px));
          margin: 8px auto;
          padding: 18px;
        }

        .hero {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div id="app-root"></div>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script defer src="./app.js"></script>
  </body>
</html>
